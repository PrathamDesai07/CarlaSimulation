# Camera Configuration — matches the agent's front-facing RGB camera sensor.
# The TransFuser agent uses the front camera (rgb_front) for driving.
# Individual frames are captured from this sensor when FRAME_PATH is set,
# then assembled into a video via ffmpeg.

camera:
  x: 1.3
  y: 0.0
  z: 2.3
  pitch: 0.0
  yaw: 0.0
  roll: 0.0
  width: 960
  height: 480
  fov: 120
  fps: 20
  sensor_tick: 0.05
  # Frame capture rate: every N ticks at 20 Hz simulation rate
  # 5 = ~4 fps — keeps frame count manageable for long runs
  # 1 = 20 fps — full frame rate, better quality, larger output
  capture_every_n: 5

video:
  output_fps: 10
  codec: libx264
  preset: medium
  crf: 23
