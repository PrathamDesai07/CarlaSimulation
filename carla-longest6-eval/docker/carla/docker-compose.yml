services:
  carla:
    build: .
    image: carla-longest6:latest
    container_name: carla-server
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/nvidia_icd.json
    ports:
      - "2000-2002:2000-2002"
      - "8000-8002:8000-8002"
    command: /workspace/CarlaUE4.sh -RenderOffScreen -quality-level=Low -carla-rpc-port=2000
    volumes:
      - ../../outputs/logs/carla:/home/carla/logs
    restart: unless-stopped
    networks:
      - carla-net

networks:
  carla-net:
    name: carla-longest6-net
    driver: bridge
